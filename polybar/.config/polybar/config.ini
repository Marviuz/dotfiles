[colors]
base = #1b1e28
mantle = #171a21
crust = #131417
text = #cdd9e5
subtext0 = #94a3b8
subtext1 = #a0aec0
surface0 = #2c313c
surface1 = #3b404b
surface2 = #464b55
overlay0 = #5a6072
overlay1 = #70778d
overlay2 = #8491a8
blue = #73b8ff
lavender = #a2b4f2
sapphire = #4f9bb3
sky = #66b7d7
teal = #6ec5b8
green = #9dd274  
yellow = #d7b14f
peach = #ec927e
maroon = #d9797b
red = #ec6f74
mauve = #a483c4
pink = #ec7cba
flamingo = #e99ab1
rosewater = #f3d3da
transparent = #FF00000

[colors]
background = ${colors.base}
background-alt = ${colors.blue}
foreground = ${colors.text}
primary = ${colors.mauve}
secondary = ${colors.mantle}
alert = ${colors.red}
disabled = ${colors.subtext1}

[bar/poimandres]
monitor = ${env:MONITOR:}
width = 100%
height = 24pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
bottom = true
line-size = 6pt
border-color = ${colors.green}  
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.green}   
font-0 = Geist Mono Nerd Font:size=12
modules-left = xworkspaces xwindow
modules-right = pulseaudio memory cpu wlan date battery
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.crust}
label-active-underline = ${colors.green}  
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#F3D3DA}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %layout%
label-layout-foreground = ${colors.primary}
label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}
full-at = 99
format-charging = <animation-charging> <label-charging>
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750
animation-charging-foreground = ${colors.peach}
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
low-at = 5
battery = BAT0
adapter = ACAD
poll-interval = 5

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#D7B14F}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#D7B14F}%ifname%%{F-} %essid%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#D7B14F}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
date = %b %e, %Y | %I:%M %p 
date-alt = %B %d %Y | %I:%M:%S %p  
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
